<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We received your message</title>
</head>
<body style="margin:0;padding:0;background:#f6f3ee;font-family:Georgia,'Times New Roman',serif;color:#1f1a17;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:28px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:560px;background:#fff;border:1px solid #eadfce;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:#c0392b;padding:24px 28px;color:#fff;">
              <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;opacity:.9;">{{brand_name}}</div>
              <h1 style="margin:8px 0 0;font-size:26px;font-weight:normal;">Thanks for reaching out</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px;font-size:16px;line-height:1.7;">
              <p style="margin:0 0 16px;">Hi {{name}},</p>
              <p style="margin:0 0 16px;color:#433933;">
                We’ve received your message about <strong>{{subject}}</strong>.
                Our team will get back to you as soon as possible.
              </p>
              <p style="margin:0 0 16px;color:#433933;">
                In the meantime, feel free to explore our menu and place an order anytime.
              </p>
              <p style="margin:24px 0 0;color:#433933;">
                Warm regards,<br /><strong>{{brand_name}} Team</strong>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
